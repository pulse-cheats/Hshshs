name: DarkDev Ultimate Builder
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate DarkDev Source
        run: |
          # 1. Makefile
          cat <<'EOF' > Makefile
          DEBUG = 0
          FINALPACKAGE = 1
          ARCHS = arm64
          TARGET = iphone:clang:latest:14.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = DarkDev
          DarkDev_FILES = Tweak.xm
          DarkDev_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          DarkDev_LDFLAGS = -undefined dynamic_lookup
          DarkDev_CODESIGN_FLAGS = -S/dev/null
          DarkDev_FRAMEWORKS = UIKit Foundation CoreGraphics QuartzCore
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          # 2. Control file
          cat <<'EOF' > control
          Package: app.darkdev.client
          Name: DarkDev Client
          Version: 1.0.1
          Architecture: iphoneos-arm
          Description: Fixed 12-Module Pro Utility for Minecraft
          EOF

          # 3. Tweak.xm (Fixed Button Click & Window Logic)
          cat <<'EOF' > Tweak.xm
          #import <UIKit/UIKit.h>
          #import <substrate.h>
          #import <objc/runtime.h>

          // --- FORWARD DECLARATIONS ---
          @interface DarkDevGUI : UIView
          @property (nonatomic, strong) UIScrollView *scroll;
          @end

          // --- GLOBAL SETTINGS ---
          struct {
              bool killaura = false, fly = false, freecam = false, esp = false;
              bool spawnerLines = false, storageLines = false, speed = false;
              bool autocrystal = false, autoanchor = false, autototem = false;
              bool criticals = false, autoeat = false;
          } darkDev;

          // --- GUI IMPLEMENTATION ---
          @implementation DarkDevGUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithWhite:0.05 alpha:0.95];
                  self.layer.borderColor = [UIColor redColor].CGColor;
                  self.layer.borderWidth = 2;
                  self.layer.cornerRadius = 15;
                  
                  UILabel *header = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 40)];
                  header.text = @"DARKDEV v1.1";
                  header.textColor = [UIColor whiteColor];
                  header.textAlignment = NSTextAlignmentCenter;
                  header.backgroundColor = [UIColor redColor];
                  [self addSubview:header];

                  self.scroll = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 40, frame.size.width, frame.size.height - 40)];
                  [self addSubview:self.scroll];

                  int y = 10;
                  NSArray *mods = @[@"KillAura", @"Flight", @"FreeCam", @"ESP", @"Spawner Tracers", @"Storage Tracers", @"Speed", @"Auto Crystal", @"Auto Anchor", @"Auto Totem", @"Criticals", @"Auto Eat"];
                  bool *vars[] = {&darkDev.killaura, &darkDev.fly, &darkDev.freecam, &darkDev.esp, &darkDev.spawnerLines, &darkDev.storageLines, &darkDev.speed, &darkDev.autocrystal, &darkDev.autoanchor, &darkDev.autototem, &darkDev.criticals, &darkDev.autoeat};

                  for (int i = 0; i < mods.count; i++) {
                      UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(15, y, 140, 30)];
                      l.text = mods[i]; l.textColor = [UIColor whiteColor]; [self.scroll addSubview:l];
                      UISwitch *s = [[UISwitch alloc] initWithFrame:CGRectMake(160, y, 0, 0)];
                      s.onTintColor = [UIColor redColor];
                      objc_setAssociatedObject(s, "p", [NSValue valueWithPointer:vars[i]], OBJC_ASSOCIATION_RETAIN_NONATOMIC);
                      [s addTarget:self action:@selector(sw:) forControlEvents:UIControlEventValueChanged];
                      [self.scroll addSubview:s];
                      y += 45;
                  }
                  self.scroll.contentSize = CGSizeMake(frame.size.width, y + 20);
              }
              return self;
          }
          - (void)sw:(UISwitch *)s {
              bool *v = (bool *)[[objc_getAssociatedObject(s, "p") pointerValue] pointerValue];
              if (v) *v = s.on;
          }
          @end

          // --- BUTTON HANDLER ---
          @interface DarkDevManager : NSObject
          @property (nonatomic, strong) DarkDevGUI *menu;
          @property (nonatomic, strong) UIButton *btn;
          @end

          @implementation DarkDevManager
          - (void)tglM {
              if (self.menu) {
                  self.menu.hidden = !self.menu.hidden;
                  if (!self.menu.hidden) [self.menu.superview bringSubviewToFront:self.menu];
              }
          }
          - (void)drag:(UIPanGestureRecognizer *)p {
              UIView *v = p.view;
              CGPoint loc = [p translationInView:v.superview];
              v.center = CGPointMake(v.center.x + loc.x, v.center.y + loc.y);
              [p setTranslation:CGPointZero inView:v.superview];
          }
          @end

          static DarkDevManager *mgr;

          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 6 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  for (UIWindowScene* s in [UIApplication sharedApplication].connectedScenes) {
                      if (s.activationState == UISceneActivationStateForegroundActive) { win = s.windows.firstObject; break; }
                  }
                  if (!win) win = [UIApplication sharedApplication].keyWindow;

                  if (win) {
                      mgr = [[DarkDevManager alloc] init];
                      
                      mgr.btn = [UIButton buttonWithType:UIButtonTypeCustom];
                      mgr.btn.frame = CGRectMake(40, 120, 60, 60);
                      mgr.btn.backgroundColor = [UIColor redColor];
                      mgr.btn.layer.cornerRadius = 30;
                      mgr.btn.layer.zPosition = 1000;
                      [mgr.btn setTitle:@"DD" forState:UIControlStateNormal];
                      [mgr.btn addTarget:mgr action:@selector(tglM) forControlEvents:UIControlEventTouchUpInside];
                      
                      UIPanGestureRecognizer *p = [[UIPanGestureRecognizer alloc] initWithTarget:mgr action:@selector(drag:)];
                      [mgr.btn addGestureRecognizer:p];
                      [win addSubview:mgr.btn];

                      mgr.menu = [[DarkDevGUI alloc] initWithFrame:CGRectMake(win.frame.size.width/2-110, win.frame.size.height/2-150, 220, 320)];
                      mgr.menu.hidden = YES;
                      mgr.menu.layer.zPosition = 1001;
                      [win addSubview:mgr.menu];
                  }
              });
          }
          EOF

      - name: Setup Dependencies
        run: brew install ldid xz

      - name: Setup Theos & SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          
      - name: Build DarkDev
        run: |
          export THEOS=~/theos
          make
          
      - name: Optimize & Sign
        run: |
          mkdir -p final_output
          DYLIB_PATH=$(find .theos/obj -name "*.dylib" -type f | head -n 1)
          strip -x $DYLIB_PATH
          ldid -S $DYLIB_PATH
          cp $DYLIB_PATH final_output/DarkDev.dylib

      - name: Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkDev-V13-Fixed
          path: final_output/DarkDev.dylib
