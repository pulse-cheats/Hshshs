name: Build DarkDev Client
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          
      - name: Setup SDK
        run: |
          git clone --depth 1 https://github.com/L-S-D/Minecraft-iOS-SDK SDK
          
      - name: Build DarkDev
        run: |
          export THEOS=~/theos
          make package
          
      - name: Upload DarkDev Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkDev-Dylib
          path: packages/*.deb
