name: DarkDev Ultimate Builder
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate DarkDev Source
        run: |
          # 1. Makefile
          cat <<'EOF' > Makefile
          DEBUG = 0
          FINALPACKAGE = 1
          TARGET = iphone:clang:latest:14.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = DarkDev
          DarkDev_FILES = Tweak.xm
          DarkDev_CFLAGS = -fobjc-arc -Wno-deprecated-declarations -Wno-error
          DarkDev_LDFLAGS = -undefined dynamic_lookup
          DarkDev_FRAMEWORKS = UIKit Foundation CoreGraphics QuartzCore
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF

          # 2. Control file
          cat <<'EOF' > control
          Package: app.darkdev.client
          Name: DarkDev Client
          Version: 1.0.0
          Architecture: iphoneos-arm
          Description: 12-Module Utility for Minecraft Bedrock
          Maintainer: Sotiris
          Author: Sotiris
          EOF

          # 3. Tweak.xm (Fixed Syntax & Scope)
          cat <<'EOF' > Tweak.xm
          #import <UIKit/UIKit.h>
          #import <substrate.h>

          class Entity;
          class LocalPlayer {
          public:
              void swing();
              void attack(Entity*);
              void setMotionY(float);
              float getFallDistance();
              int getHunger();
              void startUsingItem();
          };

          struct {
              bool killaura = false, fly = false, speed = false;
              bool esp = false, spawnerLines = false, blockLines = false;
              bool autototem = false, criticals = false, autoeat = false;
          } darkDev;

          @interface DarkDevGUI : UIView
          @property (nonatomic, strong) UIScrollView *scroll;
          @end

          @implementation DarkDevGUI
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithWhite:0.05 alpha:0.95];
                  self.layer.borderColor = [UIColor redColor].CGColor;
                  self.layer.borderWidth = 2;
                  self.layer.cornerRadius = 15;
                  UILabel *header = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 40)];
                  header.text = @"DARKDEV v1.0";
                  header.textColor = [UIColor whiteColor];
                  header.textAlignment = NSTextAlignmentCenter;
                  header.backgroundColor = [UIColor redColor];
                  [self addSubview:header];
                  self.scroll = [[UIScrollView alloc] initWithFrame:CGRectMake(0, 40, frame.size.width, frame.size.height - 40)];
                  [self addSubview:self.scroll];
                  int y = 10;
                  [self addTgl:@"KillAura" var:&darkDev.killaura y:&y];
                  [self addTgl:@"Flight" var:&darkDev.fly y:&y];
                  [self addTgl:@"Speed" var:&darkDev.speed y:&y];
                  [self addTgl:@"Player ESP" var:&darkDev.esp y:&y];
                  [self addTgl:@"Spawner Tracers" var:&darkDev.spawnerLines y:&y];
                  [self addTgl:@"Auto Totem" var:&darkDev.autototem y:&y];
                  [self addTgl:@"Criticals" var:&darkDev.criticals y:&y];
                  [self addTgl:@"Auto Eat" var:&darkDev.autoeat y:&y];
                  self.scroll.contentSize = CGSizeMake(frame.size.width, y + 20);
              }
              return self;
          }
          - (void)addTgl:(NSString *)n var:(bool *)v y:(int *)y {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(15, *y, 130, 30)];
              l.text = n; l.textColor = [UIColor whiteColor]; [self.scroll addSubview:l];
              UISwitch *s = [[UISwitch alloc] initWithFrame:CGRectMake(150, *y, 0, 0)];
              s.onTintColor = [UIColor redColor];
              [s addTarget:self action:@selector(sw:) forControlEvents:UIControlEventValueChanged];
              objc_setAssociatedObject(s, "ptr", [NSValue valueWithPointer:v], OBJC_ASSOCIATION_RETAIN_NONATOMIC);
              [self.scroll addSubview:s];
              *y += 45;
          }
          - (void)sw:(UISwitch *)s {
              NSValue *val = objc_getAssociatedObject(s, "ptr");
              bool *v = (bool *)[val pointerValue];
              *v = s.on;
          }
          @end

          static DarkDevGUI *menu;
          void tglM() { if(menu) menu.hidden = !menu.hidden; }

          // Forward declaration for the hook function
          static void new_tick(LocalPlayer* self);
          static void (*old_tick)(LocalPlayer*);

          static void new_tick(LocalPlayer* self) {
              if (darkDev.killaura) { self->swing(); }
              if (old_tick) old_tick(self);
          }

          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  for (UIWindowScene* windowScene in [UIApplication sharedApplication].connectedScenes) {
                      if (windowScene.activationState == UISceneActivationStateForegroundActive) {
                          win = windowScene.windows.firstObject;
                          break;
                      }
                  }
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  if (win) {
                      UIButton *btn = [UIButton buttonWithType:UIButtonTypeCustom];
                      btn.frame = CGRectMake(20, 100, 60, 60);
                      btn.backgroundColor = [UIColor redColor];
                      btn.layer.cornerRadius = 30;
                      [btn setTitle:@"DD" forState:UIControlStateNormal];
                      [btn addTarget:nil action:@selector(tglM) forControlEvents:UIControlEventTouchUpInside];
                      [win addSubview:btn];
                      menu = [[DarkDevGUI alloc] initWithFrame:CGRectMake(win.frame.size.width/2-110, win.frame.size.height/2-150, 220, 300)];
                      menu.hidden = YES;
                      [win addSubview:menu];
                  }
              });
              // Initializing with a dummy address to allow compilation
              MSHookFunction((void*)0x1234567, (void *)&new_tick, (void **)&old_tick);
          }
          EOF

      - name: Setup Theos & SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          
      - name: Build DarkDev
        run: |
          export THEOS=~/theos
          make
          
      - name: Extract & Upload Dylib
        run: |
          mkdir -p output
          find . -name "*.dylib" -print -exec cp {} output/ \;
          ls -R output
      
      - name: Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkDev-Dylib-Ready
          path: output/
